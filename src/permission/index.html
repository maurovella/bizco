<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bizco · Permiso de cámara</title>
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <svg class="mark" id="mark" viewBox="0 0 120 120" aria-label="Bizco" role="img">
          <ellipse cx="44" cy="60" rx="30" ry="33" fill="#FBF5E9" stroke="#1A1714" stroke-width="5" />
          <ellipse cx="88" cy="60" rx="30" ry="33" fill="#FBF5E9" stroke="#1A1714" stroke-width="5" />
          <g fill="#1A1714">
            <circle id="pL" cx="44" cy="62" r="12" />
            <circle id="pR" cx="88" cy="62" r="12" />
          </g>
          <circle cx="40" cy="57" r="3.5" fill="#FBF5E9" />
          <circle cx="84" cy="57" r="3.5" fill="#FBF5E9" />
          <path d="M22 30 q20 -10 40 -2" fill="none" stroke="#1A1714" stroke-width="5" stroke-linecap="round" />
          <path d="M70 28 q20 -8 40 2" fill="none" stroke="#1A1714" stroke-width="5" stroke-linecap="round" />
        </svg>
        <div>
          <div class="wordmark">b<span class="dot">i</span>zco</div>
          <p class="tag">Necesito ver para cuidarte la vista.</p>
        </div>
      </header>

      <p class="lead">
        Bizco usa tu cámara <strong>100% en tu equipo</strong> para estimar tu
        distancia y postura — las imágenes nunca salen de tu compu. Tocá el botón
        y elegí <strong>Permitir</strong> en el aviso del navegador.
      </p>

      <div id="status">Pidiendo acceso a la cámara…</div>

      <div id="postura">Postura: — <small>Activá Bizco en el popup para verla.</small></div>

      <video id="preview" class="preview" autoplay muted playsinline></video>

      <button id="retry" class="btn" hidden>Pedir de nuevo</button>
    </main>

    <script type="module" src="./permission.ts"></script>
  </body>
</html>
